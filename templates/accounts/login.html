{% extends "base.html" %}
{% block title %}Sign In — DevMarket{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center px-4 pt-28 pb-16">
  <div class="w-full max-w-sm">

    <div class="mb-10 text-center">
      <span class="accent-label justify-center mb-4">Welcome Back</span>
      <h1 class="text-4xl text-title font-normal mt-2">Sign in</h1>
      <p class="text-gray-400 text-sm mt-3">No account?
        <a href="{% url 'register' %}" class="text-brand-500 hover:underline">Create one free</a>
      </p>
      
    </div>

    <form method="POST" class="space-y-5" novalidate>
      {% csrf_token %}
      {% if next %}<input type="hidden" name="next" value="{{ next }}">{% endif %}

      <div>
        <label class="block text-xs font-semibold uppercase tracking-widest text-gray-400 mb-2">Email</label>
        <input type="email" name="email" required autocomplete="email"
          value="{{ email|default:'' }}" placeholder="you@example.com"
          class="w-full bg-dark-800 border border-dark-600 rounded-lg px-4 py-3 text-white placeholder-gray-600 focus:outline-none focus:border-brand-500 transition-colors text-sm">
      </div>

      <div>
        <div class="flex justify-between items-center mb-2">
          <label class="text-xs font-semibold uppercase tracking-widest text-gray-400">Password</label>
          <a href="#" class="text-xs text-brand-500 hover:underline">Forgot password?</a>
        </div>
        <div class="relative">
          <input type="password" name="password" required id="pw-login" autocomplete="current-password"
            placeholder="••••••••"
            class="w-full bg-dark-800 border border-dark-600 rounded-lg px-4 py-3 text-white placeholder-gray-600 focus:outline-none focus:border-brand-500 transition-colors text-sm pr-10">
          <button type="button" onclick="togglePw()" class="absolute right-3 top-3 text-gray-500 hover:text-brand-500">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
            </svg>
          </button>
        </div>
      </div>

      <button type="submit"
        class="w-full bg-brand-500 hover:bg-brand-600 text-dark-900 font-bold py-3 rounded-lg transition-colors text-sm uppercase tracking-widest">
        Sign In
      </button>
    </form>

    <div class="flex items-center gap-4 my-6">
      <div class="flex-1 h-px bg-dark-600"></div>
      <span class="text-xs text-gray-600">or</span>
      <div class="flex-1 h-px bg-dark-600"></div>
    </div>
    <!-- Google Sign In -->
<a href="{% url 'google_login' %}"
  class="flex items-center justify-center gap-3 w-full border border-dark-600 hover:border-brand-500 text-white text-sm font-semibold py-3 rounded-lg transition-colors mb-4">
  <svg class="w-5 h-5" viewBox="0 0 24 24">
    <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
    <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
    <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
    <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
  </svg>
  Continue with Google
</a>

    <a href="{% url 'register' %}"
      class="block w-full text-center border border-dark-600 hover:border-brand-500 text-white text-sm font-semibold py-3 rounded-lg transition-colors">
      Create a new account
    </a>
  </div>
</div>
<script>
  function togglePw() {
    const el = document.getElementById('pw-login');
    el.type = el.type === 'password' ? 'text' : 'password';
  }
</script>
{% endblock %}
