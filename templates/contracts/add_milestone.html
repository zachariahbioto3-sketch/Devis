{% extends "base.html" %}
{% block title %}Add Milestone — DevMarket Kenya{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto px-4 py-12">

  <a href="{% url "dev_contract_detail" contract.pk %}"
    class="inline-flex items-center gap-2 text-sm text-gray-400 hover:text-white transition-colors mb-8">
    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
    </svg>
    Back to contract
  </a>

  <div class="mb-8">
    <p class="text-xs font-semibold text-brand-400 uppercase tracking-widest mb-2">New milestone</p>
    <h1 class="text-2xl font-bold text-white">Add a milestone</h1>
    <p class="text-gray-400 text-sm mt-1">{{ contract.project.title }}</p>
  </div>

  <div class="bg-dark-800 border border-dark-600 rounded-xl p-6">
    <form method="POST">
      {% csrf_token %}

      <div class="mb-4">
        <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">
          Milestone title <span class="text-red-400">*</span>
        </label>
        <input type="text" name="title" required
          placeholder="e.g. Database setup and user authentication"
          class="w-full bg-dark-700 border border-dark-600 rounded-lg px-4 py-2.5 text-sm text-white placeholder-gray-500 focus:outline-none focus:border-brand-500 transition-colors">
      </div>

      <div class="mb-4">
        <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Description</label>
        <textarea name="description" rows="3"
          placeholder="What will be delivered in this milestone?"
          class="w-full bg-dark-700 border border-dark-600 rounded-lg px-4 py-2.5 text-sm text-white placeholder-gray-500 focus:outline-none focus:border-brand-500 transition-colors resize-none">
        </textarea>
      </div>

      <div class="grid grid-cols-2 gap-4 mb-6">
        <div>
          <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">
            Amount (KES) <span class="text-red-400">*</span>
          </label>
          <input type="number" name="amount" min="0" step="100" required
            placeholder="e.g. 15000"
            class="w-full bg-dark-700 border border-dark-600 rounded-lg px-4 py-2.5 text-sm text-white placeholder-gray-500 focus:outline-none focus:border-brand-500 transition-colors">
        </div>
        <div>
          <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Due date</label>
          <input type="date" name="due_date"
            class="w-full bg-dark-700 border border-dark-600 rounded-lg px-4 py-2.5 text-sm text-white focus:outline-none focus:border-brand-500 transition-colors">
        </div>
      </div>

      <div class="flex items-center justify-between">
        <a href="{% url "dev_contract_detail" contract.pk %}"
          class="text-sm text-gray-400 hover:text-white transition-colors">Cancel</a>
        <button type="submit"
          class="bg-brand-500 hover:bg-brand-600 text-white px-8 py-3 rounded-lg text-sm font-bold transition-colors">
          Add milestone &rarr;
        </button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
