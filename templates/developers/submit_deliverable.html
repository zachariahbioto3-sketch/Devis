{% extends "base.html" %}
{% block title %}Submit Deliverable{% endblock %}

{% block content %}
<div class="max-w-xl mx-auto px-4 py-12">
  <a href="{% url "dev_contract_detail" milestone.contract.pk %}" class="inline-flex items-center gap-2 text-sm text-gray-400 hover:text-white transition-colors mb-8">
    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
    </svg>
    Back to contract
  </a>

  <div class="bg-dark-800 border border-dark-600 rounded-xl p-6">
    <h1 class="text-xl font-bold text-white mb-2">Submit deliverable</h1>
    <p class="text-sm text-gray-400 mb-6">Milestone: <span class="text-white font-semibold">{{ milestone.title }}</span> — KES {{ milestone.amount|floatformat:0 }}</p>

    <form method="POST">
      {% csrf_token %}
      <div class="space-y-4">
        <div>
          <label class="block text-xs font-semibold text-gray-400 mb-1.5">Description <span class="text-red-400">*</span></label>
          <textarea name="description" required rows="5"
            placeholder="Describe what you have completed and what is being delivered..."
            class="w-full bg-dark-700 border border-dark-600 rounded-lg px-4 py-2.5 text-sm text-white placeholder-gray-500 focus:outline-none focus:border-brand-500 transition-colors resize-none"></textarea>
        </div>
        <div>
          <label class="block text-xs font-semibold text-gray-400 mb-1.5">Link to files (GitHub, Google Drive, etc.)</label>
          <input type="url" name="file_url" placeholder="https://github.com/..."
            class="w-full bg-dark-700 border border-dark-600 rounded-lg px-4 py-2.5 text-sm text-white placeholder-gray-500 focus:outline-none focus:border-brand-500 transition-colors">
        </div>
        <div class="flex items-center justify-between pt-2">
          <a href="{% url "dev_contract_detail" milestone.contract.pk %}" class="text-sm text-gray-400 hover:text-white">Cancel</a>
          <button type="submit" class="bg-brand-500 hover:bg-brand-600 text-white px-6 py-2.5 rounded-lg text-sm font-bold transition-colors">
            Submit for review &rarr;
          </button>
        </div>
      </div>
    </form>
  </div>
</div>
{% endblock %}
